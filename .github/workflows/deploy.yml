  name: Deploy PDF OCR                                                             
   
  on:                                                                              
    push:                                                   
      branches: [main]
    workflow_dispatch:

  jobs:                                                                            
    deploy:
      runs-on: ubuntu-latest                                                       
      steps:                                                
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Install wrangler                                                   
          run: npm install -g wrangler
                                                                                   
        - name: Deploy Worker + Container                   
          run: wrangler deploy
          env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
